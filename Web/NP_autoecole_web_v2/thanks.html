<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message envoyé — NP Auto-école</title>
    <meta name="robots" content="noindex, nofollow" />
    <link
      rel="icon"
      type="image/png"
      href="assets/img/logo_np_autoecole_png.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100svh;
        display: grid;
        place-items: center;
        font-family: "Inter", sans-serif;
        background: #f6f2ec;
        color: #16110c;
        padding: 32px;
      }
      .card {
        max-width: 540px;
        text-align: center;
        padding: 52px 40px;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(32, 24, 15, 0.1);
        box-shadow: 0 24px 70px rgba(39, 27, 12, 0.12);
      }
      .card img {
        height: 80px;
        margin: 0 auto 28px;
      }
      h1 {
        font-family: "Poppins", sans-serif;
        font-size: 28px;
        margin-bottom: 14px;
        color: #b5741c;
      }
      p {
        color: #6e6257;
        line-height: 1.7;
        margin-bottom: 28px;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        border-radius: 999px;
        background: linear-gradient(135deg, #b5741c, #7c4708);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        transition: transform 0.2s ease;
      }
      a:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="assets/img/logo_np_autoecole_png.png" alt="NP Auto-école" />
      <h1>Message envoyé !</h1>
      <p>
        Merci pour votre message. Nicolas reviendra vers vous dans les meilleurs
        délais.
      </p>
      <a href="index.html">← Retour au site</a>
    </div>
  </body>
</html>
