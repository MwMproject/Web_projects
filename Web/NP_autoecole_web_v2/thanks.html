<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message envoyé — NP Auto-école</title>
    <meta name="robots" content="noindex, nofollow" />

    <link rel="icon" type="image/png" href="assets/img/logo_np_autoecole_png.png?v=3" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 28px;
        font-family: "Inter", sans-serif;
        color: #fff;
        background:
          linear-gradient(rgba(10, 9, 7, 0.78), rgba(10, 9, 7, 0.88)),
          url("assets/img/seat-np-autoecole.webp") center / cover,
          #0c0b09;
      }

      .card {
        width: min(560px, 100%);
        text-align: center;
        padding: clamp(44px, 6vw, 64px);
        border-radius: 32px;
        background: rgba(8, 8, 8, 0.74);
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(18px);
        box-shadow: 0 34px 90px rgba(0, 0, 0, 0.45);
      }

      .card img {
        width: min(340px, 74vw);
        height: auto;
        margin: 0 auto;
        filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.45));
      }

      h1 {
        margin-bottom: 16px;
        font-family: "Poppins", sans-serif;
        font-size: clamp(30px, 5vw, 42px);
        line-height: 1.05;
        color: #e2b15f;
      }

      p {
        max-width: 420px;
        margin: 0 auto 34px;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.7;
        font-size: 16px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 14px 28px;
        border-radius: 999px;
        background: linear-gradient(135deg, #b5741c, #7c4708);
        color: #fff;
        text-decoration: none;
        font-weight: 800;
        box-shadow: 0 14px 30px rgba(124, 71, 8, 0.28);
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease;
      }

      a:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 42px rgba(124, 71, 8, 0.35);
      }

      @media (max-width: 480px) {
        .card img {
          width: min(220px, 74vw);
        }

        a {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <img src="assets/img/logo_np_autoecole_png.png?v=3" alt="NP Auto-école" />

      <h1>Message envoyé !</h1>

      <p>
        Merci pour votre message. Nicolas reviendra vers vous dans les meilleurs
        délais.
      </p>

      <a href="index.html">← Retour au site</a>
    </div>
  </body>
</html>
