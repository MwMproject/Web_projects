<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merci pour votre message</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 480px;
      padding: 40px 30px;
      background: #111;
      border-radius: 12px;
      border: 1px solid #222;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.7s ease-out;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      margin-bottom: 10px;
      color: #00ff7b;
    }

    p {
      margin-bottom: 25px;
      font-size: 1rem;
      line-height: 1.5;
      color: #ccc;
    }

    a.btn {
      display: inline-block;
      padding: 12px 24px;
      background: #00ff7b;
      color: #000;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.2s ease;
    }

    a.btn:hover {
      background: #00cc6a;
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Merci !</h1>
    <p>
      Votre message a bien été envoyé.<br />
      Je vous répondrai dans les plus brefs délais.
    </p>
    <a href="/" class="btn">Retour au site</a>
  </div>
</body>
</html>
