<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Erreur — H. Schumacher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/style.css" />
    <style>
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #ddeeff 0%, #eef6ff 55%, #f5faff 100%);
        margin: 0;
      }
      .message-box {
        text-align: center;
        background: rgba(255, 255, 255, 0.80);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(180, 210, 240, 0.5);
        border-radius: 16px;
        padding: 56px 72px;
        max-width: 520px;
      }
      .message-box img {
        height: 64px;
        margin-bottom: 32px;
        background: #0c54ed;
        border-radius: 10px;
        padding: 10px;
      }
      .message-box h1 {
        font-size: 1.6rem;
        margin: 0 0 12px;
        color: #172033;
      }
      .message-box p {
        color: #475467;
        line-height: 1.7;
        margin: 0 0 8px;
      }
      .message-box a.mail {
        color: #0c54ed;
        font-weight: 600;
        text-decoration: none;
      }
      .message-box a.mail:hover {
        text-decoration: underline;
      }
      .message-box a.btn {
        display: inline-block;
        margin-top: 28px;
        padding: 12px 28px;
        background: #0c54ed;
        color: #fff;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s;
      }
      .message-box a.btn:hover {
        background: #0a42c0;
      }
    </style>
  </head>
  <body>
    <div class="message-box">
      <img src="assets/img/Logo_HS.png" alt="Logo H. Schumacher" />
      <h1>Une erreur est survenue</h1>
      <p>Nous n'avons pas pu envoyer votre message.</p>
      <p>
        Merci de nous contacter directement à<br />
        <a class="mail" href="mailto:h2o@hschumacher.ch">h2o@hschumacher.ch</a>
      </p>
      <a class="btn" href="contact.html">Réessayer</a>
    </div>
  </body>
</html>
